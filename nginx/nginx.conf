upstream app {
    server app_blue:8001;
}
 
# Server block for handling HTTP traffic
server {
    listen 80;
    server_name 192.168.178.169 192.168.178.168 kpkapp.lan *.kpkapp.lan;
 
    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}
 
# Server block for handling HTTPS traffic
server {
    listen 443 ssl;
    server_name 192.168.178.169 192.168.178.168;  # Use your server's IP or domain name
    client_max_body_size 25m;
 
    # SSL configuration
    ssl_certificate /etc/nginx/ssl/kpkapp.lan-chain.crt;
    ssl_certificate_key /etc/nginx/ssl/kpkapp.lan.key;
    ssl_trusted_certificate /etc/nginx/ssl/kpkapp-rootCA.crt;
   
    # Enhanced SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
 
    # Add security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
 
    location / {
        proxy_pass http://app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
 
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
       
        # Enhanced websocket timeouts
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
 
    #js files no cache
    location ~* ^/static/static/.*\.m?js$ {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
 
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
 
    # Specific WebSocket endpoints
    location /ws/ {
        proxy_pass http://app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
       
        # WebSocket specific settings
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
 
    # This new location block will securely proxy requests to the local HLS streaming server.
    location /hls-stream/ {
        # The proxy_pass directive points to the HTTP server running on the host machine.
        # Docker's special 'host.docker.internal' DNS name is used for this.
        proxy_pass http://host.docker.internal:8889/;
 
        # Set headers to ensure the proxied request is handled correctly.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
   
    # Real-time WebSocket proxy for ultra-low latency streaming
    location /realtime-stream {
        proxy_pass http://host.docker.internal:8890;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
       
        # Disable buffering for real-time data
        proxy_buffering off;
        proxy_cache off;
       
        # Long timeouts for persistent connections
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
 
 
    location /dynamic/html/ {
        alias '/app/prodverse/static/prodverse/html/Kinpak, Inc/Production - Web Parts/';
        expires modified +5s;
        add_header Cache-Control "public";
    }
           
    location /static/media/core/media/GHSPictograms/ {
        alias '/app/media/core/media/GHSPictograms/';
    }
 
    location /static/nav3d/models/ {
        alias '/app/nav3d/static/nav3d/models/';
    }  
 
    location /static/nav3d/js/ {
        alias '/app/nav3d/static/nav3d/js/';
    }
 
    location = /cert {
        alias /etc/nginx/ssl/kpkapp-rootCA.crt;
        types { }
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition "attachment; filename=\"kpkapp-rootCA.crt\"" always;
    }
 
    location /kpklauncher/o365addins/excelitemlookup/ {
        alias '/app/kpklauncher/o365addins/excelitemlookup/';
        expires modified +5s;
        add_header Cache-Control "public";
        add_header Content-Type "application/xml";
    }

    # WeatherStar 4000+ nostalgic weather display
    location /weather/ {
        proxy_pass http://ws4kp:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WeatherStar data files (absolute path requests from the app)
    location /data/ {
        proxy_pass http://ws4kp:8080/data/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WeatherStar images (radar maps, etc.)
    location /images/ {
        proxy_pass http://ws4kp:8080/images/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WeatherStar music files
    location /music/ {
        proxy_pass http://ws4kp:8080/music/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
 
 
