{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    /*
    To achieve a full-screen "theater mode", we override some base styles.
    The body is made black and any top padding from the fixed navbar is removed.
    */
    body {
        background-color: #000 !important;
        padding-top: 0 !important;
    }

    /*
    The camera-container is lifted out of the normal page flow using 'position: fixed'.
    This allows it to fill the viewport below the navbar, ignoring the parent
    Bootstrap '.container' that normally adds horizontal padding.
    */
    .camera-container {
        position: fixed;
        /* This offset should ideally match the navbar's height. 80px is a pragmatic choice. */
        top: 80px;
        left: 0;
        width: 100%;
        height: calc(100vh - 80px); /* Fill the rest of the screen */
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    #video {
        width: 100%;
        height: 100%;
        /* 'object-fit: contain' ensures the entire video is visible and maintains its aspect ratio,
           fitting perfectly within the container we've defined. */
        object-fit: contain;
    }
    
    /* The rest of the overlay controls remain the same, with z-index to ensure they are on top. */
    .status-indicator {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 10px 20px;
        background-color: rgba(0, 0, 0, 0.7);
        color: white;
        border-radius: 5px;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 1;
    }
    
    .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background-color: #ff0000;
        animation: pulse 2s infinite;
    }
    
    .status-dot.connected {
        background-color: #00ff00;
    }
    
    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }
    
    .controls {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        z-index: 1;
    }
    
    .control-btn {
        padding: 10px 20px;
        background-color: rgba(50, 50, 50, 0.8);
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
    }
    
    .control-btn:hover {
        background-color: rgba(70, 70, 70, 0.9);
    }
    
    .error-message {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: rgba(255, 0, 0, 0.1);
        color: #ff6666;
        padding: 20px 40px;
        border-radius: 10px;
        border: 2px solid #ff6666;
        display: none;
        z-index: 1;
    }
</style>
<div class="camera-container">
    <video id="video" controls autoplay muted playsinline></video>
    
    <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Connecting...</span>
    </div>
    
    <div class="controls">
        <button class="control-btn" onclick="toggleFullscreen()">Fullscreen</button>
        <button class="control-btn" id="reconnectBtn">Reconnect</button>
    </div>
    
    <div class="error-message" id="errorMessage">
        <h4>Stream Connection Error</h4>
        <p>Unable to connect to the palletizer camera stream.</p>
        <p>Please ensure the streaming service is running.</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const video = document.getElementById('video');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const errorMessage = document.getElementById('errorMessage');
        
        // REAL-TIME WEBSOCKET STREAMING - THE DARK PATH TO LOW LATENCY
        let ws = null;
        let reconnectTimeout = null;
        let frameCount = 0;
        let lastFpsTime = Date.now();
        let displayedFps = 0;
        
        // Replace video element with canvas for real-time rendering
        const canvas = document.createElement('canvas');
        canvas.id = 'video';
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.objectFit = 'contain';
        video.parentNode.replaceChild(canvas, video);
        
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        function connectWebSocket() {
            updateStatus('connecting');
            console.log('REAL-TIME: Initiating WebSocket connection...');
            
            // Use secure WebSocket through Nginx proxy
            const wsUrl = `wss://${window.location.host}/realtime-stream`;
            
            try {
                ws = new WebSocket(wsUrl);
                ws.binaryType = 'arraybuffer';
                
                ws.onopen = () => {
                    console.log('REAL-TIME: WebSocket connected!');
                    updateStatus('connected');
                };
                
                ws.onmessage = (event) => {
                    try {
                        const message = JSON.parse(event.data);
                        
                        if (message.type === 'config') {
                            // Set canvas dimensions
                            canvas.width = message.width;
                            canvas.height = message.height;
                            console.log(`REAL-TIME: Stream configured - ${message.width}x${message.height} @ ${message.fps}fps`);
                        } else if (message.type === 'frame') {
                            // Decode and display frame
                            const frameData = 'data:image/jpeg;base64,' + message.data;
                            
                            img.onload = () => {
                                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                
                                // Calculate FPS
                                frameCount++;
                                const now = Date.now();
                                if (now - lastFpsTime >= 1000) {
                                    displayedFps = frameCount;
                                    frameCount = 0;
                                    lastFpsTime = now;
                                    
                                    // Calculate latency
                                    const latency = now - (message.timestamp * 1000);
                                    statusText.textContent = `Live (${displayedFps} fps, ${latency.toFixed(0)}ms)`;
                                }
                            };
                            
                            img.src = frameData;
                        }
                    } catch (e) {
                        console.error('REAL-TIME: Frame processing error:', e);
                    }
                };
                
                ws.onerror = (error) => {
                    console.error('REAL-TIME: WebSocket error:', error);
                    updateStatus('error');
                };
                
                ws.onclose = () => {
                    console.log('REAL-TIME: WebSocket disconnected');
                    updateStatus('error');
                    attemptReconnect();
                };
                
            } catch (e) {
                console.error('REAL-TIME: Failed to create WebSocket:', e);
                updateStatus('error');
                errorMessage.innerHTML = "<h4>Connection Error</h4><p>Could not establish a real-time connection to the stream server.</p>";
            }
        }
        
        function updateStatus(status) {
            switch(status) {
                case 'connected':
                    statusDot.classList.add('connected');
                    if (!statusText.textContent.includes('fps')) {
                        statusText.textContent = 'Live';
                    }
                    errorMessage.style.display = 'none';
                    break;
                case 'connecting':
                    statusDot.classList.remove('connected');
                    statusText.textContent = 'Connecting...';
                    errorMessage.style.display = 'none';
                    break;
                case 'error':
                    statusDot.classList.remove('connected');
                    statusText.textContent = 'Connection Lost';
                    errorMessage.style.display = 'block';
                    break;
            }
        }
        
        function attemptReconnect() {
            if (reconnectTimeout) {
                clearTimeout(reconnectTimeout);
            }
            
            reconnectTimeout = setTimeout(() => {
                console.log('REAL-TIME: Attempting to reconnect...');
                connectWebSocket();
            }, 3000);
        }
        
        function reconnectStream() {
            if (ws) {
                ws.close();
            }
            connectWebSocket();
        }
        
        function toggleFullscreen() {
            const element = document.getElementById('video');
            if (!document.fullscreenElement) {
                element.requestFullscreen().catch(err => {
                    console.error('Error attempting to enable fullscreen:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        // Event listeners
        document.getElementById('reconnectBtn').addEventListener('click', reconnectStream);
        
        // Override Ctrl+F to toggle fullscreen on the canvas
        canvas.addEventListener('dblclick', toggleFullscreen);
        
        // Start the real-time stream
        connectWebSocket();
    });
</script>
{% endblock %}
