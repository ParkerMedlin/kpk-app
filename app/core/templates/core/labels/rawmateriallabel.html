{% load static %}
{% block title %}<title>Raw Material Label</title>{% endblock %}
{% block scripts %}
    <link rel="stylesheet" type="text/css" href ="{% static 'core/css/rawMaterialLabel.css' %}">
    <link href="{% static 'core/vendors/jQuery/UI/jquery-ui-themes-1.13.1/jquery-ui-themes-1.13.1/themes/cupertino/jquery-ui.css' %}" rel="stylesheet" type="text/css" /> 
    <link href="{% static 'core/vendors/bootstrap/5.0.2/bootstrap.min.css' %}" rel="stylesheet">
    <script src="{% static 'core/vendors/jQuery/Core/3.6.0/jquery-3.6.0.min.js' %}"></script>  
    <script src="{% static 'core/vendors/jQuery/UI/1.13.1/jquery-ui.min.js' %}"></script>  
    <script src="{% static 'core/vendors/bootstrap/5.0.2/bootstrap.bundle.min.js' %}"></script>
    <script type="module" src="{% static 'core/js/pageModules/rawMaterialLabel.js' %}"></script>
    <script src="{% static 'core/js/thirdPartyLibraries/html2canvas-1.14.js' %}"></script>
{% endblock %}

{% block content %}


<div class="pageContainer">
    <div class="noPrint" id="linkContainer">
        <a href="/">Return to home</a>
    </div>
    <div class="buttonContainer noPrint">
        <button class="btn btn-primary" onclick="window.print()">Print</button>
        <button class="btn btn-secondary" style="margin-left: 10px;" id="rawMaterialLabelPrintButton">Blending Label Print</button>
    </div>
    <div class="labelContainer" id="labelContainer1">
        <!-- Content for the first half of the page -->
        <input type="text" id="id_item_code_1" class="item_code_field entryfield" enterkeyhint="search" placeholder="Item Num..."></input>
        <input type="text" id="id_item_description_1" class="item_description_field entryfield" enterkeyhint="search" placeholder="Description..."></input>
        <div class="quantityFields">
            <input type="number" class="quantityField">
            <h2 id="topUnitsField" class="unitsField"></h2>
        </div>
        <h2>{{ today_date|date:"m/d/Y" }}</h2>
        <div class="location_field" id="location_field_1"></div>
    </div>

    <div class="labelContainer" id="labelContainer2">
        <!-- Content for the first half of the page -->
        <input type="text" id="id_item_code_2" class="item_code_field entryfield" enterkeyhint="search" placeholder="Item Num..."></input>
        <input type="text" id="id_item_description_2" class="item_description_field entryfield" enterkeyhint="search" placeholder="Description..."></input>
        <div class="quantityFields">
            <input type="number" class="quantityField">
            <h2 id="bottomUnitsField" class="unitsField"></h2>
        </div>
        <h2>{{ today_date|date:"m/d/Y" }}</h2>
        <div class="location_field" id="location_field_2"></div>
    </div>
</div>

{% endblock content %}
