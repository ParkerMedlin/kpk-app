[pytest]
DJANGO_SETTINGS_MODULE = app.settings
python_files = tests.py test_*.py *_tests.py
addopts = --strict-config --strict-markers
asyncio_mode = auto
markers =
    websockets: Websocket-focused tests covering consumers and helpers.
    e2e: Browser-driven end-to-end tests executed via Playwright.
testpaths =
    tests
pythonpath =
    app
log_cli = true
log_cli_level = INFO
log_cli_format = %(levelname)s %(name)s:%(message)s
